<div class="container py-5 fade-in-section">
  <div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
      <div class="glass-card p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="bg-dark rounded-circle d-inline-flex mb-3" style="width: 60px; height: 60px; align-items: center; justify-content: center; background: rgba(255,255,255,0.05) !important;">
            <i class="bi bi-shield-lock-fill text-warning fs-2"></i>
          </div>
          <h2 class="text-white mb-1">DineEase Portal</h2>
          <p class="text-secondary small">Sign in to manage your dining reservations</p>
        </div>

        @if (errorMessage()) {
          <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()">
          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label text-secondary small">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary border-end-0 text-secondary">
                <i class="bi bi-person"></i>
              </span>
              <input type="text" 
                     id="username" 
                     name="username" 
                     class="form-control border-start-0" 
                     placeholder="Enter username" 
                     [(ngModel)]="username" 
                     required>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="password" class="form-label text-secondary small">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary border-end-0 text-secondary">
                <i class="bi bi-key"></i>
              </span>
              <input type="password" 
                     id="password" 
                     name="password" 
                     class="form-control border-start-0" 
                     placeholder="Enter password" 
                     [(ngModel)]="password" 
                     required>
            </div>
          </div>

          <!-- Sign In Button -->
          <button type="submit" class="btn btn-gold w-100 py-2 fs-5 mb-3" [disabled]="isLoading()">
            @if (isLoading()) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Authenticating...
            } @else {
              Sign In
            }
          </button>
        </form>

        <div class="text-center pt-2">
          <p class="text-secondary small mb-0">
            Don't have an account? 
            <a routerLink="/register" class="text-warning text-decoration-none">Create Account</a>
          </p>
        </div>
      </div>
      
      <!-- Demo Credentials Info (Helper) -->
      <div class="mt-4 text-center">
        <div class="glass-card py-2 px-3 d-inline-block text-secondary small" style="background: rgba(255,255,255,0.02) !important;">
          <i class="bi bi-info-circle me-1 text-warning"></i> Demo logins: 
          <span class="text-white ms-2">Admin: <strong>admin</strong> / <strong>admin123</strong></span> | 
          <span class="text-white ms-2">Customer: <strong>john</strong> / <strong>password</strong></span>
        </div>
      </div>
    </div>
  </div>
</div>
